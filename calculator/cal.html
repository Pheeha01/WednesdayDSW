<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cal.css">
    <script src="cal.js" defer></script>
</head>
<body>
    <h1 style="font-size: 70px; text-align: center; color: white;">CALCULATOR</h1>
    <div id="Calculator">
         <div>
            <input id="displays" readonly>
        </div>
        <div id="funcButtons">
            <div id="firstRow">
                <button id="clearAll" class="clear">C</button>
                <button id="divide" class="operator">/</button>
                <button id="multi" class="operator">*</button>
                <button id="backSpace" class="clear">Del</button>
            </div>
            <div id="secondRow">
                <button class="numBtn" id="number">7</button>
                <button class="numBtn" >8</button>
                <button class="numBtn" >9</button>
                <button id="minus" class="operator">-</button>
            </div>
            <div id="thirdRow">
                <button class="numBtn" >4</button>
                <button class="numBtn" >5</button>
                <button class="numBtn" >6</button>
                <button id="sum" class="operator">+</button>
            </div>

            <div id="forthRow">
                <button class="numBtn" >1</button>
                <button class="numBtn" >2</button>
                <button class="numBtn" >3</button>
                <button id="equal" class="operator">=</button>
                <button id="percent" class="percentage">%</button>
                <button class="numBtn" >0</button>
                <button id="comma" class="operator">.</button>
            </div>   
        </div>
    </div>
   
</body>
</html>
